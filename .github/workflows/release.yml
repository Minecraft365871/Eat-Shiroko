name: Build and Release                        # 工作流名称

on:                                            # 触发器
  push:
    branches: [ main ]                         # push 到 main 时触发
  workflow_dispatch:                           # 允许手动触发工作流

jobs:                                          # 作业
  build:                                       # build 作业
    runs-on: ubuntu-latest                     # 工作流运行环境

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4              # 将代码仓库检出到 runner

      - name: Set up Node.js
        uses: actions/setup-node@v2            # 设置 Node.js 环境
        with:
          node-version: "16"

      - name: Install dependencies
        run: npm install                       # 安装项目依赖

      - name: Build project
        run: npm run build                     # 构建项目

      - name: Archive production artifacts
        uses: actions/upload-artifact@v4       # 上传构建产物
        with:
          name: build-artifacts
          path: build/

  release:                                     # release 作业
    needs: build                               # 依赖于 build 作业
    runs-on: ubuntu-latest

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4     # 下载构建产物
        with:
          name: build-artifacts

      - name: Zip build artifacts
        run: zip -r build-artifacts.zip build/ # 将构建产物打包成 ZIP

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v1   # 在 GitHub 上创建新 release
        with:
          tag_name: v${{ github.run_number }}
          release_name: Release v${{ github.run_number }}
          body: |
            Release notes for version v${{ github.run_number }}
          draft: false
          prerelease: false
          files: build-artifacts.zip
